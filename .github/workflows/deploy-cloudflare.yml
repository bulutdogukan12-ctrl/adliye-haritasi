name: Cloudflare Pages'e Yayinla

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Kaynak kodunu al
        uses: actions/checkout@v4

      - name: Node.js 24 kur
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Bagimliliklari kur
        run: npm ci

      - name: Veriyi dogrula
        run: npm run data:validate

      - name: Uretim paketini olustur
        run: npm run build

      - name: Cloudflare Pages'e yayinla
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy dist --project-name=adliye-haritasi --branch=main
